version: 2

builds:
  - id: contract-cli
    main: ./cmd/contract-cli
    binary: contract-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X cn.qfei/contract-cli/internal/build.Version={{ .Version }} -X cn.qfei/contract-cli/internal/build.Commit={{ .Commit }} -X cn.qfei/contract-cli/internal/build.Date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "contract-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
